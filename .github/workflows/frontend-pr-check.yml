name: Frontend - PR Check

on:
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Install dependencies
      - name: Install dependencies
        working-directory: frontend
        run: npm install

      # Run ESLint
      - name: Run Lint
        working-directory: frontend
        run: npm run lint --if-present

      # Run tests
      - name: Run Tests
        working-directory: frontend
        run: npm test --if-present

      # Build application
      - name: Build Project
        working-directory: frontend
        run: npm run build --if-present
