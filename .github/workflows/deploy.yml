name: Deployment Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment:
      name: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Dev
        run: echo "Deploying to dev"

  deploy-uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: uat

    steps:
      - name: Deploy UAT
        run: echo "Deploying to uat"

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-uat
    environment:
      name: prod

    steps:
      - name: Deploy Production
        run: echo "Deploying to production"
