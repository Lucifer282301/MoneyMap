name: Front - PR Check

# This triggers the workflow whenever a PR is opened or updated
on:
  pull_request:
    branches: ["master", "main"] # Adjust to match your base branch

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js (Adjust version as needed)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm" # Use 'yarn' if you use yarn.lock

      # 3. Install dependencies
      - name: Install dependencies
        working-directory: frontend
        run: npm install

      # 4. Run your linter (if applicable)
      - name: Run Lint
        working-directory: frontend
        run: npm run lint --if-present

      # 5. Run tests (if applicable)
      - name: Run Tests
        working-directory: frontend
        run: npm test --if-present

      # 6. Verify the app builds successfully
      - name: Build Project
        working-directory: frontend
        run: npm run build --if-present
