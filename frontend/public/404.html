<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      const base = "/MERN-AI-MoneyMap-App";
      const path = location.pathname.replace(base, "") || "/";
      const search = location.search;
      const hash = location.hash;
      location.replace(base + "/?redirect=" + encodeURIComponent(path + search + hash));
    </script>
  </head>
  <body></body>
</html>
